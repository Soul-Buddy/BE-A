# ============================================================
# application.yml — Soul Buddy 백엔드 공통 설정
# ⚠️ 이 파일은 Git에 커밋합니다. 실제 값은 절대 넣지 마세요.
# ⚠️ 모든 민감 정보는 환경변수로 주입합니다.
# ============================================================

spring:
  application:
    name: soul-buddy

  # ── 데이터소스 ──
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ── JPA ──
  jpa:
    hibernate:
      ddl-auto: validate          # 운영: validate / 로컬: create-drop (local yml에서 override)
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQL8Dialect

  # ── OAuth2 ──
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
            authorization-grant-type: authorization_code

          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            scope:
              - profile_nickname
              - account_email
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post

        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

# ── 서버 ──
server:
  port: ${SERVER_PORT:8080}

# ── JWT ──
jwt:
  secret: ${JWT_SECRET}
  access-token-expiry: 3600000      # 1시간 (ms)
  refresh-token-expiry: 604800000   # 7일 (ms)

# ── AI (OpenAI GPT-4o) ──
ai:
  openai:
    api-key: ${OPENAI_API_KEY}
    base-url: https://api.openai.com/v1
    model: gpt-4o
    max-tokens: 800
    temperature: 0.7
    timeout-seconds: 30
    max-retry: 2

# ── CORS ──
cors:
  allowed-origins: ${CORS_ORIGIN}

# ── Swagger ──
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# ── 로깅 ──
logging:
  level:
    com.soulbuddy: INFO
    org.springframework.web: WARN
