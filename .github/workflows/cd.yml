name: Java CD with GitHub Actions

on:
  workflow_run:
    workflows: ["Java CI with Gradle"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read # 추가 권한 (일반적으로 필요)

    steps:
      # 1. 아티팩트 목록 확인 (디버깅용)
      - name: List available artifacts
        run: |
          echo "Workflow Run ID: ${{ github.event.workflow_run.id }}"
          curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/artifacts" \
            | jq '.artifacts[] | {name: .name, id: .id, expired: .expired}'

      # 2. CI 워크플로우에서 생성된 Artifact 다운로드
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # path: ./ # 필요 시 다운로드 경로 지정

      # 3. EC2로 JAR 파일 전송
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/libs/*.jar" # Gradle 기본 경로 확인 필요
          target: "/home/ubuntu/app"
          strip_components: 2 # build/libs 폴더 구조를 제외하고 파일만 전송
          rm: true

      # 4. EC2에서 애플리케이션 실행
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo fuser -k 8080/tcp || true
            nohup java -jar /home/ubuntu/app/*.jar > /home/ubuntu/app/app.log 2>&1 &