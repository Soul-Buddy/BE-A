name: Java CD with GitHub Actions

on:
  workflow_run:
    workflows: ["Java CI with Gradle"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read

    steps:
      # 1. CI에서 생성된 Artifact 다운로드
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ./downloaded_artifact # 찾기 쉽게 특정 폴더에 다운로드

      # 2. EC2로 JAR 파일 전송
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # '**/*.jar'를 쓰면 어떤 폴더에 있든 모든 .jar를 찾습니다.
          source: "**/*.jar"
          target: "/home/ubuntu/app"
          # 모든 상위 폴더 구조를 제거하고 파일명만 전송
          strip_components: 10
          rm: true

      # 3. EC2에서 애플리케이션 실행
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 8080 포트를 사용 중인 기존 프로세스 종료
            sudo fuser -k 8080/tcp || true
            
            # 이전 JAR 파일 삭제 (깔끔한 배포를 위해)
            rm -rf /home/ubuntu/app/*.jar.old
            
            # 백그라운드 실행 및 로그 기록
            nohup java -jar /home/ubuntu/app/*.jar > /home/ubuntu/app/app.log 2>&1 &
            
            # 실행 확인 (3초 후 프로세스 떠있는지 확인)
            sleep 3
            ps -ef | grep java