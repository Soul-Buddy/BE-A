name: Java CD with GitHub Actions

on:
  workflow_run:
    workflows: ["Java CI with Gradle"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read

    steps:
      # 1. CI에서 생성된 Artifact 다운로드
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ./downloaded_artifact # 👈 위치를 이 폴더로 고정합니다.

      # 2. [디버깅] 파일이 제대로 들어왔는지 로그 확인 (에러 시 이 단계를 보세요)
      - name: Check file location
        run: ls -R ./downloaded_artifact

      # 3. EC2로 JAR 파일 전송
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # 💡 다운로드한 폴더 내의 모든 하위 폴더에서 .jar를 찾습니다.
          source: "downloaded_artifact/**/*.jar"
          target: "/home/ubuntu/app"
          # 💡 폴더 구조가 아무리 깊어도 파일명만 남기고 서버에 올립니다.
          strip_components: 10
          rm: true

      # 4. EC2에서 애플리케이션 실행
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 8080 포트 사용 프로세스 종료
            sudo fuser -k 8080/tcp || true
            
            # 이전 파일 정리
            rm -rf /home/ubuntu/app/*.jar.old
            
            # 서버 실행 (로그는 app.log에 기록)
            nohup java -jar /home/ubuntu/app/*.jar > /home/ubuntu/app/app.log 2>&1 &
            
            # 실행 확인 (3초 대기 후 프로세스 조회)
            sleep 3
            ps -ef | grep java