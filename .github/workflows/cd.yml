name: Java CD with GitHub Actions

on:
  workflow_run:
    workflows: ["Java CI with Gradle"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      # 💡 [핵심] CI가 끝나고 아티팩트가 시스템에 등록될 시간을 위해 잠시 대기 (안정성 확보)
      - name: Wait for GitHub Artifacts to be ready
        run: sleep 20

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          # 💡 [핵심] github.event.workflow_run.id를 통해 정확한 실행 시점의 파일을 지정
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "*.jar"
          target: "/home/ubuntu/app"
          rm: true

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo fuser -k 8080/tcp || true
            nohup java -jar /home/ubuntu/app/*.jar > /dev/null 2>&1 &