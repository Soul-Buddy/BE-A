name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 설정 파일 생성 시에도 경로에 backend를 포함해야 합니다.
      - name: Make application.yml
        run: |
          mkdir -p ./backend/src/main/resources
          echo "${{ secrets.APPLICATION_PROPERTIES }}" > ./backend/src/main/resources/application.yml

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: ./backend  # backend 폴더 안의 gradlew를 찾도록 설정

      - name: Build with Gradle
        run: ./gradlew build -x test
        working-directory: ./backend  # backend 폴더 안에서 빌드 수행

      # 빌드된 JAR 파일을 다음 단계(CD)에서 쓸 수 있게 업로드 (중요!)
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/build/libs/*.jar