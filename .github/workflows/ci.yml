name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 설정 파일 생성 (backend 폴더 내 위치)
      - name: Make application.yml
        run: |
          mkdir -p ./backend/src/main/resources
          echo "${{ secrets.APPLICATION_PROPERTIES }}" > ./backend/src/main/resources/application.yml

      # 권한 부여 및 빌드
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: ./backend

      - name: Build with Gradle
        run: ./gradlew build -x test
        working-directory: ./backend

      # 빌드된 파일이 실제로 있는지 로그로 확인 (디버깅용)
      - name: Check Build Result
        run: ls -l backend/build/libs/

      # 💡 이 부분이 핵심입니다! 경로를 정확히 찍어줘야 CD가 찾을 수 있습니다.
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/build/libs/*[!plain].jar