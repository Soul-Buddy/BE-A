name: testfolder

services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_DATABASE: soul_buddy_test
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data_test:/var/lib/mysql

  backend:
    build: ./backend
    ports:
      - "8081:8080"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/soul_buddy_test?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      FRONTEND_URL: ${FRONTEND_URL}
      SERVER_PORT: 8080
      CLOVA_API_KEY: ${CLOVA_API_KEY}
      CLOVA_HOST: ${CLOVA_HOST}
      CLOVA_REQUEST_ID_PERSONA_FRIEND: ${CLOVA_REQUEST_ID_PERSONA_FRIEND}
      CLOVA_REQUEST_ID_PERSONA_COUNSELOR: ${CLOVA_REQUEST_ID_PERSONA_COUNSELOR}
      CLOVA_REQUEST_ID_CLASSIFY_EMOTION: ${CLOVA_REQUEST_ID_CLASSIFY_EMOTION}
      CLOVA_REQUEST_ID_CLASSIFY_RISK: ${CLOVA_REQUEST_ID_CLASSIFY_RISK}
      CLOVA_REQUEST_ID_CLASSIFY_INTERVENTION: ${CLOVA_REQUEST_ID_CLASSIFY_INTERVENTION}
      CLOVA_REQUEST_ID_SUMMARY: ${CLOVA_REQUEST_ID_SUMMARY}
      RAG_ENABLED: ${RAG_ENABLED:-false}
      VECTOR_STORE_TYPE: ${VECTOR_STORE_TYPE:-NONE}
    depends_on:
      - mysql

volumes:
  mysql_data_test:
